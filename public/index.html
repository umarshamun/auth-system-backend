<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Auth System Dashboard</title>
                <style>
                        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
                                .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 360px; margin-bottom: 20px; }
                                        h2 { margin-top: 0; color: #333; }
                                                input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
                                                        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
                                                                button:hover { background-color: #218838; }
                                                                        .toggle-btn { background-color: #007bff; margin-top: 10px; }
                                                                                .toggle-btn:hover { background-color: #0069d9; }
                                                                                        .message { margin-top: 10px; font-weight: bold; color: #d9534f; text-align: center; }
                                                                                                .success { color: #28a745; }
                                                                                                        .hidden { display: none; }
                                                                                                            </style>
                                                                                                            </head>
                                                                                                            <body>

                                                                                                                <div class="card" id="authCard">
                                                                                                                        <h2 id="formTitle">Sign Up</h2>
                                                                                                                                <form id="authForm">
                                                                                                                                            <input type="text" id="username" placeholder="Username" required>
                                                                                                                                                        <input type="email" id="email" placeholder="Email Address" required>
                                                                                                                                                                    <input type="password" id="password" placeholder="Password (min 6 chars)" required>
                                                                                                                                                                                <button type="submit" id="submitBtn">Register</button>
                                                                                                                                                                                        </form>
                                                                                                                                                                                                <button class="toggle-btn" id="toggleForm">Switch to Login</button>
                                                                                                                                                                                                        <div class="message" id="authMessage"></div>
                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                <div class="card hidden" id="dashboardCard">
                                                                                                                                                                                                                        <h2>Welcome to Dashboard</h2>
                                                                                                                                                                                                                                <p><strong>Username:</strong> <span id="profileUsername"></span></p>
                                                                                                                                                                                                                                        <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                                                                                                                                                                                                                                                <button id="logoutBtn" style="background-color: #dc3545;">Log Out</button>
                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                const authForm = document.getElementById('authForm');
                                                                                                                                                                                                                                                                        const formTitle = document.getElementById('formTitle');
                                                                                                                                                                                                                                                                                const submitBtn = document.getElementById('submitBtn');
                                                                                                                                                                                                                                                                                        const toggleForm = document.getElementById('toggleForm');
                                                                                                                                                                                                                                                                                                const usernameInput = document.getElementById('username');
                                                                                                                                                                                                                                                                                                        const emailInput = document.getElementById('email');
                                                                                                                                                                                                                                                                                                                const passwordInput = document.getElementById('password');
                                                                                                                                                                                                                                                                                                                        const authMessage = document.getElementById('authMessage');
                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                        const authCard = document.getElementById('authCard');
                                                                                                                                                                                                                                                                                                                                                const dashboardCard = document.getElementById('dashboardCard');

                                                                                                                                                                                                                                                                                                                                                        let isLoginMode = false;

                                                                                                                                                                                                                                                                                                                                                                // Toggle between Login and Register views
                                                                                                                                                                                                                                                                                                                                                                        toggleForm.addEventListener('click', () => {
                                                                                                                                                                                                                                                                                                                                                                                    isLoginMode = !isLoginMode;
                                                                                                                                                                                                                                                                                                                                                                                                if (isLoginMode) {
                                                                                                                                                                                                                                                                                                                                                                                                                formTitle.innerText = "Log In";
                                                                                                                                                                                                                                                                                                                                                                                                                                submitBtn.innerText = "Login";
                                                                                                                                                                                                                                                                                                                                                                                                                                                toggleForm.innerText = "Switch to Sign Up";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                usernameInput.classList.add('hidden');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                usernameInput.removeAttribute('required');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            formTitle.innerText = "Sign Up";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            submitBtn.innerText = "Register";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            toggleForm.innerText = "Switch to Login";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            usernameInput.classList.remove('hidden');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            usernameInput.setAttribute('required', 'required');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    authMessage.innerText = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Handle Form Submission
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            authForm.addEventListener('submit', async (e) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        e.preventDefault();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    authMessage.innerText = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const payload = isLoginMode 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ? { email: emailInput.value, password: passwordInput.value }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        : { username: usernameInput.value, email: emailInput.value, password: passwordInput.value };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const response = await fetch(endpoint, {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        method: 'POST',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            headers: { 'Content-Type': 'application/json' },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                body: JSON.stringify(payload)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const data = await response.json();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (!response.ok) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    authMessage.classList.remove('success');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        authMessage.innerText = data.message || "An error occurred";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            authMessage.classList.add('success');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                authMessage.innerText = data.message;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (isLoginMode) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Save token securely in localStorage
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    localStorage.setItem('token', data.token);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            loadDashboard(data.user);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // After successful registration, flip to login mode automatically
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                toggleForm.click();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        authMessage.classList.add('success');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                authMessage.innerText = "Registration successful! Please log in.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                } catch (err) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                authMessage.innerText = "Failed to connect to the server.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function loadDashboard(user) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        authCard.classList.add('hidden');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    dashboardCard.classList.remove('hidden');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('profileUsername').innerText = user.username;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('profileEmail').innerText = user.email;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('logoutBtn').addEventListener('click', () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        localStorage.removeItem('token');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    window.location.reload();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
